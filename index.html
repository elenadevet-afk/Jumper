<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 500px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Редактор "Прыжок знаний" 🧗</h2>
    <input type="color" id="p-col" value="#4caf50" onchange="draw()"> Цвет платформ<br>
    <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()" placeholder="URL персонажа">
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Вопрос "+(i+1), a: "ответ"}));

    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Настройка 10 уровней:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<small>Уровень ${i+1}</small><br>
                Вопрос: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Ответ: <input type="text" value="${val.a}" oninput="tasks[${i}].a=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const pUrl = document.getElementById('p-url').value;
        const pCol = document.getElementById('p-col').value;
        const data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;overflow:hidden;background:#87ceeb;font-family:sans-serif">
            <div id="game" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;bottom:20px;left:45%;width:50px;height:50px;background:url(${pUrl}) no-repeat center/contain;transition:0.5s"></div>
            </div>
            <div id="m" style="position:absolute;top:50px;left:50px;width:300px;background:white;padding:15px;text-align:center;border-radius:10px">
                <h3 id="q"></h3>
                <input type="text" id="ans" placeholder="Ваш ответ...">
                <button onclick="check()">Ответить</button>
            </div>
            <script>
                const tasks=${data}, p=document.getElementById("p"), q=document.getElementById("q"), inp=document.getElementById("ans");
                let lvl=0;
                tasks.forEach((_,i)=>{
                    const div=document.createElement("div");
                    div.style="position:absolute;width:80px;height:15px;background:${pCol};left:"+(Math.random()*280)+"px;bottom:"+(60+i*45)+"px";
                    document.getElementById("game").appendChild(div);
                });
                function show(){ q.innerText=tasks[lvl].q; }
                function check(){
                    if(inp.value.toLowerCase() === tasks[lvl].a.toLowerCase()){
                        lvl++; p.style.bottom=(lvl*45+20)+"px"; inp.value="";
                        if(lvl>=tasks.length) alert("Победа!"); else show();
                    } else { alert("Неверно! Падение!"); p.style.bottom="20px"; lvl=0; show(); }
                }
                show();
            <\/script></body></html>' width="400" height="500" frameborder="0"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код скопирован!"); }
    renderEditor(); draw();
</script>
</body>
</html>
