<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 500px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input, select { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Настройка игры 🎮</h2>
    Язык: <select id="lang" onchange="draw()"><option value="ru">Русский</option><option value="en">English</option></select><br>
    Жизни: <input type="number" id="lives" value="3" oninput="draw()"><br>
    Финальное сообщение: <input type="text" id="win-msg" value="Well done!" oninput="draw()"><br>
    Цвет платформ: <input type="color" id="p-col" value="#4caf50" onchange="draw()"><br>
    URL персонажа: <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()"><br>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Q"+(i+1), right: "True", wrong: "False"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Вопросы:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Правильно: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Ошибка: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const pUrl = document.getElementById('p-url').value, pCol = document.getElementById('p-col').value;
        const lang = document.getElementById('lang').value, lives = document.getElementById('lives').value;
        const winMsg = document.getElementById('win-msg').value, data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;overflow:hidden;background:transparent;font-family:sans-serif">
            <div id="g" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;bottom:20px;left:45%;width:50px;height:50px;background:url(${pUrl}) no-repeat center/contain;transition:0.5s"></div>
                <div id="l" style="position:absolute;top:10px;left:10px;font-size:24px"></div>
            </div>
            <div id="m" style="position:absolute;top:100px;left:25px;width:350px;background:rgba(0,0,0,0.8);padding:20px;text-align:center;border-radius:15px;color:white;border:2px solid gold">
                <h3 id="q"></h3>
                <div style="display:flex; justify-content:space-around; gap:10px;">
                    <button id="b1" onclick="check(true)" style="padding:10px;cursor:pointer;flex:1"></button>
                    <button id="b2" onclick="check(false)" style="padding:10px;cursor:pointer;flex:1"></button>
                </div>
            </div>
            <div id="end" style="display:none;position:absolute;top:0;width:400px;height:500px;background:rgba(0,0,0,0.9);color:gold;display:flex;flex-direction:column;justify-content:center;align-items:center;">
                <h1>${winMsg}</h1>
                <button onclick="location.reload()">Reset</button>
            </div>
            <script>
                const tasks=${data}, p=document.getElementById("p"), q=document.getElementById("q"), b1=document.getElementById("b1"), b2=document.getElementById("b2"), lDiv=document.getElementById("l");
                let lvl=0, lives=${lives};
                function updateHearts(){ lDiv.innerText="❤️".repeat(lives); }
                updateHearts();
                tasks.forEach((_,i)=>{
                    const d=document.createElement("div");
                    d.style="position:absolute;width:60px;height:10px;background:${pCol};left:"+(Math.random()*300)+"px;bottom:"+(60+i*45)+"px;border-radius:5px";
                    document.getElementById("g").appendChild(d);
                });
                function show(){ 
                    q.innerText=tasks[lvl].q; const c=Math.random()>0.5;
                    b1.innerText=c?tasks[lvl].right:tasks[lvl].wrong; b2.innerText=c?tasks[lvl].wrong:tasks[lvl].right;
                    b1.dataset.r=c; b2.dataset.r=!c;
                }
                function check(c){
                    const r = c?(b1.dataset.r==="true"):(b2.dataset.r==="true");
                    if(r){ 
                        lvl++; p.style.bottom=(lvl*45+20)+"px"; 
                        if(lvl>=tasks.length) document.getElementById("end").style.display="flex"; else show(); 
                    } else { 
                        lives--; updateHearts();
                        if(lives<=0){ alert("${lang==="ru"?"Конец игры":"Game Over"}"); location.reload(); } 
                        else { p.style.bottom="20px"; lvl=0; show(); }
                    }
                }
                show();
            <\/script></body></html>' width="400" height="500" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код скопирован!"); }
    renderEditor(); draw();
</script>
</body>
</html>
