<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        body { margin: 0; padding: 0; background: #87ceeb; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 400px; height: 500px; position: relative; margin: 0 auto; background: #87ceeb; }
        .step { position: absolute; width: 60px; height: 10px; background: #4caf50; border-radius: 5px; }
        #char { position: absolute; width: 70px; height: 70px; transition: 0.3s; background: url('https://cdn-icons-png.flaticon.com/128/1997/1997576.png') no-repeat center/contain; }
        #q-panel { position: absolute; bottom: 0; right: 0; width: 200px; background: #000; color: #fff; padding: 15px; text-align: center; }
        button { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-container">
        <script>
            for(let i=0; i<10; i++) {
                document.write(`<div class="step" style="left:${30 + (i*30)}px; bottom:${60 + (i*40)}px;"></div>`);
            }
        </script>
        <div id="char" style="left:25px; bottom:70px;"></div>
        <div id="q-panel">
            <h3 id="q-text" style="margin:0 0 10px 0; font-size:16px;">Question 1</h3>
            <button onclick="alert('Верно!')">True</button>
            <button onclick="alert('Ошибка!')">False</button>
        </div>
    </div>
</body>
</html>
