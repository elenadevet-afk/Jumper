<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;overflow:hidden;background:transparent;font-family:sans-serif">
            <div id="g" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;bottom:20px;left:175px;width:50px;height:50px;background:url(https://cdn-icons-png.flaticon.com/128/1997/1997576.png) no-repeat center/contain;transition:0.5s"></div>
                <div id="l" style="position:absolute;top:5px;left:10px;font-size:24px;z-index:100"></div>
            </div>
            <div id="m" style="position:absolute;bottom:10px;left:25px;width:350px;background:rgba(0,0,0,0.6);padding:15px;text-align:center;border-radius:10px;color:#c11f1f;font-size:16px;z-index:50">
                <h3 id="q" style="margin:0 0 10px 0"></h3>
                <div style="display:flex; justify-content:space-around; gap:10px;">
                    <button id="b1" onclick="check(true)" style="padding:10px;cursor:pointer;flex:1"></button>
                    <button id="b2" onclick="check(false)" style="padding:10px;cursor:pointer;flex:1"></button>
                </div>
            </div>
            <script>
                const tasks=[{"q":"Q1","right":"True","wrong":"False"},{"q":"Q2","right":"True","wrong":"False"},{"q":"Q3","right":"True","wrong":"False"},{"q":"Q4","right":"True","wrong":"False"},{"q":"Q5","right":"True","wrong":"False"},{"q":"Q6","right":"True","wrong":"False"},{"q":"Q7","right":"True","wrong":"False"},{"q":"Q8","right":"True","wrong":"False"},{"q":"Q9","right":"True","wrong":"False"},{"q":"Q10","right":"True","wrong":"False"}], p=document.getElementById("p"), q=document.getElementById("q"), b1=document.getElementById("b1"), b2=document.getElementById("b2"), lDiv=document.getElementById("l");
                let lvl=0, lives=3;
                function updateHearts(){ lDiv.innerText="❤️".repeat(lives); }
                updateHearts();
                tasks.forEach((_,i)=>{
                    const d=document.createElement("div");
                    // Лесенка: меняем left через каждые 80px, чтобы не было столкновений
                    const x = (i % 2 === 0) ? 60 : 260;
                    d.style="position:absolute;width:80px;height:12px;background:#4caf50;left:"+x+"px;bottom:"+(60+i*40)+"px;border-radius:5px";
                    document.getElementById("g").appendChild(d);
                });
                function show(){ 
                    q.innerText=tasks[lvl].q; const c=Math.random()>0.5;
                    b1.innerText=c?tasks[lvl].right:tasks[lvl].wrong; b2.innerText=c?tasks[lvl].wrong:tasks[lvl].right;
                    b1.dataset.r=c; b2.dataset.r=!c;
                }
                function check(c){
                    const r = c?(b1.dataset.r==="true"):(b2.dataset.r==="true");
                    if(r){ 
                        lvl++; 
                        const x = (lvl % 2 === 0) ? 175 : 275;
                        p.style.bottom=(lvl*40+20)+"px"; p.style.left=x+"px";
                        if(lvl>=tasks.length) alert("Victory!"); else show(); 
                    } else { 
                        lives--; updateHearts();
                        if(lives<=0){ location.reload(); } else { p.style.bottom="20px"; p.style.left="175px"; lvl=0; show(); }
                    }
                }
                show();
            </script></body></html>' width="400" height="500" frameborder="0" allowtransparency="true"></iframe>
