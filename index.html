<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        textarea { width: 100%; height: 80px; }
        input { width: 100%; margin-bottom: 10px; }
        #output { width: 100%; height: 150px; background: #333; color: #0f0; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Настройки игры "Прыгун"</h2>
        <label>URL персонажа (картинка):</label>
        <input type="text" id="pImg" value="https://img.icons8.com/color/96/000000/genshin-impact.png">
        
        <label>Цвет платформ (например: #4CAF50):</label>
        <input type="text" id="pColor" value="#4CAF50">
        
        <label>Задания (формат: Вопрос|Правильный ответ(true/false)):</label>
        <textarea id="tasks">Геншин - это игра?|true
В 7 классе учат физику?|true
1+1=5?|false</textarea>
        
        <button onclick="generate()" style="padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer;">СГЕНЕРИРОВАТЬ IFRAME</button>
        
        <h3>Скопируйте этот код для Genially:</h3>
        <textarea id="output" readonly></textarea>
    </div>

    <script>
        function generate() {
            const pImg = document.getElementById('pImg').value;
            const pColor = document.getElementById('pColor').value;
            const tasks = document.getElementById('tasks').value.split('\n').map(line => {
                const [q, a] = line.split('|');
                return { q, a: a.trim() === 'true' };
            });

            const gameCode = `
<!DOCTYPE html>
<html><body style="margin:0; overflow:hidden; background:#87CEEB;">
<div id="game" style="width:100vw; height:100vh; position:relative;">
    <div id="player" style="width:50px; height:50px; position:absolute; bottom:20px; left:45%; background:url('${pImg}') no-repeat center/contain; transition:0.5s;"></div>
</div>
<div id="modal" style="display:none; position:fixed; top:20%; left:20%; width:60%; padding:20px; background:white; text-align:center; border-radius:10px;">
    <h2 id="qText"></h2>
    <button onclick="ans(true)" style="padding:10px 20px;">Верно</button>
    <button onclick="ans(false)" style="padding:10px 20px;">Ошибка</button>
</div>
<script>
    let level = 0; const tasks = ${JSON.stringify(tasks)};
    function createPlat(y) {
        const div = document.createElement('div');
        div.style = "position:absolute; width:100px; height:20px; background:${pColor};";
        div.style.left = Math.random() * 80 + '%';
        div.style.bottom = y + 'px';
        document.getElementById('game').appendChild(div);
    }
    for(let i=0; i<10; i++) createPlat(100 + i*150);
    function show() {
        if(level >= tasks.length) return alert("Победа!");
        document.getElementById('qText').innerText = tasks[level].q;
        document.getElementById('modal').style.display = 'block';
    }
    function ans(v) {
        if(v === tasks[level].a) {
            level++;
            document.getElementById('player').style.bottom = (level * 150 + 20) + 'px';
            document.getElementById('modal').style.display = 'none';
            if(level < tasks.length) setTimeout(show, 1000);
        } else {
            alert('Неверно! Падение!');
            location.reload();
        }
    }
    show();
<\/script></body></html>`.replace(/"/g, "'");

            document.getElementById('output').value = '<iframe srcdoc="' + gameCode + '" width="600" height="400" frameborder="0"></iframe>';
        }
    </script>
</body>
</html>
