<iframe srcdoc="
<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <style>
        body { margin: 0; background: #87ceeb; font-family: sans-serif; overflow: hidden; }

        .step { position: absolute; width: 60px; height: 10px; background: #4caf50; border-radius: 5px; }
        .char { position: absolute; width: 70px; height: 70px; background: url('https://cdn-icons-png.flaticon.com/128/1997/1997576.png') center/contain; }
        .panel { position: absolute; bottom: 0; right: 0; width: 200px; background: black; color: white; padding: 10px; text-align: center; }

    </style>
</head>
<body>
    <div id='game'>
        <script>
            // Лестница
            for(let i=0; i<10; i++) {
                document.write('<div class=\'step\' style=\'left:'+(30+i*30)+'px; bottom:'+(60+i*40)+'px;\'></div>');
            }
        </script>
        <div class='char' style='left:25px; bottom:70px;'></div>
        <div class='panel'>
            <h3 id='q-text' style='margin:0 0 5px 0; font-size:14px;'>Вопрос 1</h3>
            <button onclick='alert(\"Верно!\")'>True</button>
            <button onclick='alert(\"Ошибка!\")'>False</button>
        </div>
    </div>
</body>
</html>" width="400" height="500" frameborder="0"></iframe>
