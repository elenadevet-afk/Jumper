<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 500px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Quest Settings 🛠️</h2>
    Lives (Hearts): <input type="number" id="lives-count" value="3" min="1" max="5" oninput="draw()"><br>
    Time (min): <input type="number" id="time-limit" value="5" min="0" oninput="draw()"><br>
    Timer Color: <input type="color" id="timer-col" value="#ff0000" onchange="draw()"><br>
    Victory Text: <input type="text" id="win-text" value="Well done!" oninput="draw()"><br>
    Character Size: <input type="range" id="p-size" min="20" max="300" value="100" oninput="draw()"><br>
    Platform Color: <input type="color" id="p-col" value="#4caf50" onchange="draw()"><br>
    Character URL: <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()"><br>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">COPY CODE FOR GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Question "+(i+1), right: "True", wrong: "False"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Questions:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Correct: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Wrong: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

                <div id="platforms-container"></div>
                <div id="hearts" style="position:absolute;top:5px;right:10px;font-size:20px;"></div>
            </div>

            <div id="m" style="position:absolute;bottom:0px;right:0px;width:200px;background:#000;opacity:0.9;padding:10px;text-align:center;color:#fff;z-index:50">
                <h3 id="q" style="margin:5px 0; font-size:14px;"></h3>
                <button id="b1" onclick="check(true)" style="display:block;width:100%;margin-bottom:5px;cursor:pointer;"></button>
                <button id="b2" onclick="check(false)" style="display:block;width:100%;cursor:pointer;"></button>
            </div>

                let lvl=0, lives=maxLives;

                }
